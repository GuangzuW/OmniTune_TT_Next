{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    {{- include "omnitune.labels" . | nindent 4 }}
    app: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: {{ include "omnitune.image" (dict "root" . "repo" .Values.web.repository) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
          env:
            - name: NEXT_PUBLIC_AGGREGATOR_URL
              value: "{{ .Values.web.aggregatorUrl }}"
            - name: NEXT_PUBLIC_USERSYNC_URL
              value: "{{ .Values.web.userSyncUrl }}"
          readinessProbe:
            httpGet: { path: /, port: {{ .Values.web.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web
  labels:
    {{- include "omnitune.labels" . | nindent 4 }}
    app: web
spec:
  selector:
    app: web
  ports:
    - port: {{ .Values.web.port }}
      targetPort: {{ .Values.web.port }}
{{- end }}
