version: '3.8'

services:
  aggregator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

  user-sync:
    build:
      context: ./backend
      dockerfile: Dockerfile.user_sync
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/postgres?sslmode=disable
    depends_on:
      - db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:alpine
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
