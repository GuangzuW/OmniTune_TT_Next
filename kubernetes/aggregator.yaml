apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aggregator
  template:
    metadata:
      labels:
        app: aggregator
    spec:
      containers:
      - name: aggregator
        image: omnitune/aggregator:latest
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_ADDR
          value: "redis-service:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: aggregator-service
spec:
  selector:
    app: aggregator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
